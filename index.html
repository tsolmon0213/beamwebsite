  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

16%, transparent);\n  --shadow-lg: 0 12px 32px color-mix(in srgb, #2d2b2b 22%, transparent);\n}\n\n& {\n  background: var(--color-bg);\n  color: var(--color-text);\n  font-family: var(--font-body);\n}\nh1, h2, h3, h4 { font-family: var(--font-heading); font-weight: var(--font-heading-weight); }\n\n.grayscale{filter:grayscale(1) contrast(1.08)}\n\n/* ══════════════════════════════════════════════════════════════════════════\n   Components — built with the tokens above. Plain CSS\n   on plain HTML: no JavaScript, no build step. Each class is documented in\n   readme.md and demonstrated in foundations/ and components/.\n   ══════════════════════════════════════════════════════════════════════ */\n\n*, *::before, *::after { box-sizing: border-box; }\n& { margin: 0; font-size: 15px; line-height: 1.55; font-weight: 400; }\nh1, h2, h3, h4, h5, h6 {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  line-height: 1.12; letter-spacing: -0.015em; margin: 0 0 var(--space-2);\n}\nh1 { font-size: 42px; }\nh2 { font-size: 32px; }\nh3 { font-size: 25px; }\nh4 { font-size: 20px; }\nh5 { font-size: 16px; }\nh6 { font-size: 13px; }\nh6 { letter-spacing: 0.08em; text-transform: uppercase; }\np { margin: 0 0 var(--space-3); }\na { color: var(--color-accent); text-underline-offset: 3px; }\nimg { display: block; max-width: 100%; }\nfigure { margin: 0; }\nfigcaption {\n  font-size: 11px; margin-top: var(--space-1);\n  color: color-mix(in srgb, var(--color-text) 55%, transparent);\n}\n.text-muted { color: color-mix(in srgb, var(--color-text) 55%, transparent); }\n:focus { outline: none; }\n:focus-visible { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n::selection { background: color-mix(in srgb, var(--color-accent) 30%, transparent); }\n\n/* — rules — */\n.hr {\n  height: 2px; border: 0; margin: var(--space-4) 0;\n  background: var(--color-divider);\n}\n\n/* — buttons — */\n.btn {\n  display: inline-flex; align-items: center; justify-content: center; gap: 6px;\n  cursor: pointer; text-decoration: none;\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 14px; line-height: 1.2; color: var(--color-text); /* matches the .input's 14px —\n     the pair sits side by side in sign-up rows */\n  background: transparent; border: 1px solid transparent;\n  padding: var(--space-2) calc(var(--space-3) * 1.2);\n  border-radius: var(--radius-md);\n}\n.btn svg { display: block; }\n.btn:disabled { opacity: 0.45; cursor: not-allowed; }\n.btn-primary { background: var(--color-accent); color: var(--color-bg); }\n.btn-primary:hover { background: var(--color-accent-600); }\n.btn-primary:active { background: var(--color-accent-700); }\n.btn-secondary { border-color: var(--color-divider); }\n.btn-secondary:hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.btn-secondary:active { background: color-mix(in srgb, var(--color-text) 14%, transparent); }\n.btn-ghost { color: var(--color-accent); padding-inline: var(--space-1); }\n.btn-ghost:hover { background: color-mix(in srgb, var(--color-accent) 10%, transparent); }\n.btn-ghost:active { background: color-mix(in srgb, var(--color-accent) 18%, transparent); }\n.btn-icon { width: 36px; height: 36px; padding: 0; }\n.btn-block { width: 100%; margin-top: var(--space-2); justify-content: flex-start; text-align: left; }\n\n/* — forms — */\n.field > label {\n  display: block; font-size: 12px; margin-bottom: 5px;\n  color: color-mix(in srgb, var(--color-text) 70%, transparent);\n}\n.input {\n  width: 100%; min-height: 36px; padding: 6px 10px; font: inherit;\n  font-size: 14px; color: var(--color-text); caret-color: var(--color-accent);\n  background: var(--color-surface);\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.input:hover { border-color: color-mix(in srgb, var(--color-text) 45%, transparent); }\n.input:focus-visible { border-color: var(--color-accent); outline-offset: 0; }\ntextarea.input { min-height: 90px; resize: vertical; }\n.radio { display: inline-flex; align-items: center; gap: 8px; cursor: pointer; font-size: 14px; }\n.radio input, .seg-opt input {\n  position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;\n}\n.radio .dot {\n  width: 16px; height: 16px; flex: none; border-radius: 50%;\n  border: 1.5px solid var(--color-divider);\n}\n.radio:hover .dot { border-color: var(--color-accent); }\n.radio input:checked + .dot {\n  border-color: var(--color-accent); background: var(--color-accent);\n  box-shadow: inset 0 0 0 4px var(--color-bg);\n}\n.radio input:focus-visible + .dot { outline: 2px solid var(--color-accent); outline-offset: 2px; }\n.seg {\n  display: inline-flex; overflow: hidden;\n  border: 1px solid var(--color-divider); border-radius: var(--radius-md);\n}\n.seg-opt {\n  display: inline-flex; align-items: center; gap: 6px;\n  padding: 7px 12px; font-size: 13px; cursor: pointer;\n}\n.seg-opt + .seg-opt { border-left: 1px solid var(--color-divider); }\n.seg-opt:has(input:checked) { background: var(--color-accent); color: var(--color-bg); }\n.seg-opt:not(:has(input:checked)):hover { background: color-mix(in srgb, var(--color-text) 7%, transparent); }\n.seg-opt:has(input:focus-visible) { outline: 2px solid var(--color-accent); outline-offset: -2px; }\n\n/* — cards — */\n.card {\n  display: flex; flex-direction: column; gap: var(--space-2);\n  padding: var(--space-3); border-radius: var(--radius-md); background: var(--color-surface);\n}\n.card-kicker { font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--color-accent); }\n.card-title {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 17px; line-height: 1.2;\n}\n.card-& { margin: 0; font-size: 13px; opacity: 0.8; flex: 1; }\n.card-meta {\n  display: flex; align-items: center; gap: 6px; font-size: 11px;\n  color: color-mix(in srgb, var(--color-text) 50%, transparent);\n}\n.elev-sm { box-shadow: var(--shadow-sm); }\n.elev-md { box-shadow: var(--shadow-md); }\n.elev-lg { box-shadow: var(--shadow-lg); }\n\n/* — tags — */\n.tag {\n  display: inline-flex; align-items: center; font-size: 11px;\n  letter-spacing: 0.02em; padding: 3px 10px;\n  border-radius: calc(var(--radius-md) * 0.75);\n}\n.tag-accent { background: var(--color-accent-100); color: var(--color-accent-800); }\n.tag-accent-2 { background: var(--color-accent-2-100); color: var(--color-accent-2-800); }\n.tag-neutral { background: var(--color-neutral-100); color: var(--color-neutral-800); }\n.tag-outline { border: 1px solid var(--color-accent); color: var(--color-accent); }\n\n/* — navigation — */\n.nav {\n  display: flex; align-items: center; gap: var(--space-4);\n  padding: var(--space-3) var(--space-4);\n  border-bottom: 2px solid var(--color-divider);\n}\n.nav-brand {\n  font-family: var(--font-heading); font-weight: var(--font-heading-weight);\n  font-size: 18px; margin-right: auto;\n}\n.nav a { color: inherit; text-decoration: none; font-size: 14px; }\n.nav a:hover, .nav a[aria-current='page'] { color: var(--color-accent); }\n\n/* — tables — */\n.table { width: 100%; border-collapse: collapse; font-size: 14px; }\n.table th {\n  text-align: left; font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;\n  color: color-mix(in srgb, var(--color-text) 60%, transparent);\n  padding: var(--space-2); border-bottom: 2px solid var(--color-divider);\n}\n.table td {\n  padding: var(--space-2);\n  border-bottom: 1px solid var(--color-divider);\n}\n.table tbody tr:hover { background: color-mix(in srgb, var(--color-text) 4%, transparent); }\n\n/* — dialog — */\n.dialog-backdrop {\n  position: fixed; inset: 0; display: grid; place-items: center;\n  padding: var(--space-4);\n  background: color-mix(in srgb, var(--color-neutral-900) 50%, transparent);\n}\n.dialog {\n  width: min(440px, 100%); display: flex; flex-direction: column; gap: var(--space-3);\n  padding: var(--space-4); border-radius: var(--radiu  background: var(--color-accent); border-color:var(--color-accent); }\n\n  /* ---- Fluid type & spacing: scale continuously at every width ---- */\n  .beam-resp section { padding-left: clamp(18px, 3.2vw, 40px) !important; padding-right: clamp(18px, 3.2vw, 40px) !important; }\n  .beam-resp h1 { font-size: clamp(34px, 5vw, 70px) !important; }\n  .beam-resp img { height: auto; }\n\n  /* ---- Tablet / medium ---- */\n  @media (max-width: 1024px) {\n    .beam-resp section { padding-top: 48px !important; padding-bottom: 48px !important; }\n    .beam-resp [style*=\"repeat(3\"] { grid-template-columns: 1fr 1fr !important; }\n  }\n  /* ---- Stack two-column layouts ---- */\n  @media (max-width: 860px) {\n    .beam-resp section[style*=\"grid\"],\n    .beam-resp footer { grid-template-columns: 1fr !important; }\n    .beam-resp [style*=\"repeat(4\"] { grid-template-columns: repeat(2, 1fr) !important; }\n    .beam-resp [style*=\"repeat(3\"] { grid-template-columns: 1fr !important; }\n    .beam-resp [style*=\"border-right\"] { border-right: 0 !important; border-bottom: 2px solid var(--color-divider) !important; }\n    .beam-resp [style*=\"min-height:660px\"], .beam-resp [style*=\"min-height: 660px\"] { min-height: 0 !important; }\n    .beam-resp div:has(> .slide) { min-height: 340px !important; }\n    .beam-resp h2 { font-size: clamp(26px, 5.4vw, 40px) !important; }\n    /* board cards: give each portrait a sane height once stacked/narrow */\n    .beam-resp [style*=\"aspect-ratio:3/4\"] { aspect-ratio: 4/3 !important; }\n  }\n  /* ---- Phones ---- */\n  @media (max-width: 560px) {\n    .beam-resp section { padding-top: 36px !important; padding-bottom: 36px !important; }\n    .beam-resp [style*=\"repeat(4\"],\n    .beam-resp [style*=\"repeat(2\"],\n    .beam-resp [style*=\"grid-template-columns: 1fr 1fr\"],\n    .beam-resp [style*=\"grid-template-columns:1fr 1fr\"] { grid-template-columns: 1fr !important; }\n    .beam-resp footer { gap: 24px !important; }\n    .beam-resp div:has(> .mongolia/\" target=\"_blank\" class=\"btn btn-primary\" style=\"text-decoration:none;\">Instagram<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fnav>\n\n    <!-- HOME -->\n    <div style=\"display:{{ dHome }};\">\n      <section style=\"display:grid; grid-template-columns:1.05fr .95fr; gap:0; border-bottom:2px solid var(--color-divider); min-height:660px;\">\n        <div style=\"padding:64px 40px; border-right:2px solid var(--color-divider); display:flex; flex-direction:column; justify-content:center;\">\n          \n          <h1 style=\"font-size:70px; line-height:.95; margin:16px 0 22px;\">Business,<br>learned by <span style=\"color:var(--color-accent);\">doing.<\u002Fspan><\u002Fh1>\n          <p style=\"font-size:18px; max-width:46ch;\">BEAM helps students across Mongolia fall in love with business — and gives them the skills to build real things in the real world.<\u002Fp>\n          <div style=\"display:flex; gap:12px; margin-top:30px;\">\n            <a sc-camel-on-click=\"{{ goBecome }}\" class=\"btn btn-primary\" style=\"cursor: pointer; display: none\">About Us<\u002Fa>\n            <a sc-camel-on-click=\"{{ goEvents }}\" class=\"btn btn-secondary\" style=\"cursor:pointer;\">See events<\u002Fa>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"position:relative; overflow:hidden;\">\n          <div class=\"slide grayscale\" style=\"opacity:{{ op0 }};\"><image-slot id=\"mod-hero-1\" shape=\"rect\" placeholder=\"Slideshow photo 1\"><\u002Fimage-slot><\u002Fdiv>\n          <div class=\"slide grayscale\" style=\"opacity:{{ op1 }};\"><image-slot id=\"mod-hero-2\" shape=\"rect\" placeholder=\"Slideshow photo 2\"><\u002Fimage-slot><\u002Fdiv>\n          <div class=\"slide grayscale\" style=\"opacity:{{ op2 }};\"><image-slot id=\"mod-hero-3\" shape=\"rect\" placeholder=\"Slideshow photo 3\"><\u002Fimage-slot><\u002Fdiv>\n          <div class=\"slide grayscale\" style=\"opacity:{{ op3 }};\"><image-slot id=\"mod-hero-4\" shape=\"rect\" placeholder=\"Slideshow photo 4\"><\u002Fimage-slot><\u002Fdiv>\n          <div style=\"position:absolute; left:20px; bottom:20px; display:flex; gap:10px; z-index:3;\">\n            <button class=\"slide-arrow\" sc-camel-on-click=\"{{ prev }}\" aria-label=\"Previous\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m15 18-6-6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n            <button class=\"slide-arrow\" sc-camel-on-click=\"{{ next }}\" aria-label=\"Next\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"m9 18 6-6-6-6\"><\u002Fpath><\u002Fsvg><\u002Fbutton>\n          <\u002Fdiv>\n          <div style=\"position:absolute; right:20px; bottom:33px; display:flex; gap:8px; z-index:3;\">\n            <button class=\"slide-dot {{ dot0 }}\" sc-camel-on-click=\"{{ go0 }}\" aria-label=\"Slide 1\"><\u002Fbutton>\n            <button class=\"slide-dot {{ dot1 }}\" sc-camel-on-click=\"{{ go1 }}\" aria-label=\"Slide 2\"><\u002Fbutton>\n            <button class=\"slide-dot {{ dot2 }}\" sc-camel-on-click=\"{{ go2 }}\" aria-label=\"Slide 3\"><\u002Fbutton>\n            <button class=\"slide-dot {{ dot3 }}\" sc-camel-on-click=\"{{ go3 }}\" aria-label=\"Slide 4\"><\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"border-bottom:2px solid var(--color-divider); padding:56px 40px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:30px;\">\n          <h2 style=\"font-size:30px;\">Real numbers to feature<\u002Fh2>\n          \n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:2px solid var(--color-divider);\">\n          <div style=\"padding:24px; border-right:2px solid var(--color-divider);\"><div style=\"font-family:var(--font-heading); font-size:56px; line-height:1; color:var(--color-accent);\">05<br><\u002Fdiv><div class=\"card-title\">Schools reached<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:24px; border-right:2px solid var(--color-divider);\"><div style=\"font-family:var(--font-heading); font-size:56px; line-height:1; color:var(--color-accent);\">204<\u002Fdiv><div class=\"card-title\">Students engaged<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:24px; border-right:2px solid var(--color-divider);\"><div style=\"font-family:var(--font-heading); font-size:56px; line-height:1; color:var(--color-accent);\">01<\u002Fdiv><div class=\"card-title\">Events held<\u002Fdiv><\u002Fdiv>\n          <div style=\"padding:24px;\"><div style=\"font-family:var(--font-heading); font-size:56px; line-height:1; color:var(--color-accent);\">03<\u002Fdiv><div class=\"card-title\">Provinces reached<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n\n      <section style=\"padding:56px 40px;\">\n        <h2 style=\"font-size:30px; margin-bottom:28px;\">What we do<\u002Fh2>\n        <div style=\"display:grid; grid-template-columns:repeat(3,1fr); gap:24px;\">\n          <div class=\"card\" style=\"gap:12px;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\"><path d=\"M3 3v18h18\"><\u002Fpath><path d=\"m7 14 4-4 3 3 5-6\"><\u002Fpath><\u002Fsvg><div class=\"card-title\">Simulations<\u002Fdiv><p class=\"card-body\">Student teams run virtual companies, make real strategic calls, and compete head-to-head.<\u002Fp><\u002Fdiv>\n          <div class=\"card\" style=\"gap:12px;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\"><path d=\"M3 21h18\"><\u002Fpath><path d=\"M5 21V7l7-4 7 4v14\"><\u002Fpath><path d=\"M9 21v-6h6v6\"><\u002Fpath><\u002Fsvg><div class=\"card-title\">School chapters<\u002Fdiv><p class=\"card-body\">A BEAM chapter in every school — student-led, meeting all year to build and launch.<\u002Fp><\u002Fdiv>\n          <div class=\"card\" style=\"gap:12px;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"26\" height=\"26\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg><div class=\"card-title\">Events<\u002Fdiv><p class=\"card-body\">Competitions, workshops and simulations held throughout the year, across the country.<\u002Fp><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- ABOUT US -->\n    <div style=\"display:{{ dAbout }};\">\n      <section style=\"border-bottom:2px solid var(--color-divider); padding:64px 40px; display:grid; grid-template-columns:.85fr 1.15fr; gap:44px;\">\n        <h2 style=\"font-size: 40px; line-height: 1.02; align-self: center; text-align: center\">Business isn't learned from a textbook.<\u002Fh2><div>\n          \n          <p style=\"font-size:18px;\">Traditional classrooms teach theory. We teach practice — simulations, competitions, and school chapters where students launch, pitch, and lead. From Ulaanbaatar to the countryside, public school or private, if you're curious about business, BEAM is for you.<\u002Fp><p style=\"font-size:18px;\">Our members don't wait until graduation to try their ideas. They build companies, run campaigns, and make decisions with real stakes — supported by a national network of students and mentors who believe the same thing: business is a skill you practice, not a subject you memorize.<\u002Fp>\n        <\u002Fdiv>\n        \n      <\u002Fsection>\n\n      <!-- MANAGING BOARD -->\n      <section style=\"border-bottom:2px solid var(--color-divider); padding:60px 40px;\">\n        <div style=\"display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:34px;\">\n          <div>\n            <span class=\"tag tag-accent\" style=\"margin-bottom:14px;\">Managing Board<\u002Fspan>\n            <h2 style=\"font-size: 34px; margin-top: 14px; width: 1200px; height: 44px; text-align: center\">The students running BEAM.<\u002Fh2>\n          <\u002Fdiv>\n          \n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:repeat(4,1fr); gap:0; border:2px solid var(--color-divider);\">\n          <div style=\"border-right:2px solid var(--color-divider);\">\n            <div class=\"grayscale\" style=\"aspect-ratio:3/4; position:relative;\"><image-slot id=\"board-1\" shape=\"rect\" placeholder=\"Portrait\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:20px; border-top:2px solid var(--color-divider);\"><div class=\"card-title\" style=\"font-size:18px;\">Board member name<\u002Fdiv><div style=\"color:var(--color-accent-700); font-weight:600; font-size:14px; margin:4px 0 10px;\">President<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A short line on who they are and what they lead at BEAM.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-right:2px solid var(--color-divider);\">\n            <div class=\"grayscale\" style=\"aspect-ratio:3/4; position:relative;\"><image-slot id=\"board-2\" shape=\"rect\" placeholder=\"Portrait\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:20px; border-top:2px solid var(--color-divider);\"><div class=\"card-title\" style=\"font-size:18px;\">Board member name<\u002Fdiv><div style=\"color:var(--color-accent-700); font-weight:600; font-size:14px; margin:4px 0 10px;\">Vice President<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A short line on who they are and what they lead at BEAM.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"border-right:2px solid var(--color-divider);\">\n            <div class=\"grayscale\" style=\"aspect-ratio:3/4; position:relative;\"><image-slot id=\"board-3\" shape=\"rect\" placeholder=\"Portrait\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:20px; border-top:2px solid var(--color-divider);\"><div class=\"card-title\" style=\"font-size:18px;\">Board member name<\u002Fdiv><div style=\"color:var(--color-accent-700); font-weight:600; font-size:14px; margin:4px 0 10px;\">Head of Events<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A short line on who they are and what they lead at BEAM.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n          <div>\n            <div class=\"grayscale\" style=\"aspect-ratio:3/4; position:relative;\"><image-slot id=\"board-4\" shape=\"rect\" placeholder=\"Portrait\"><\u002Fimage-slot><\u002Fdiv>\n            <div style=\"padding:20px; border-top:2px solid var(--color-divider);\"><div class=\"card-title\" style=\"font-size:18px;\">Board member name<\u002Fdiv><div style=\"color:var(--color-accent-700); font-weight:600; font-size:14px; margin:4px 0 10px;\">Head of Chapters<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A short line on who they are and what they lead at BEAM.<\u002Fp><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- CHAPTERS -->\n    <div style=\"display:{{ dChapters }};\">\n      <section style=\"padding:60px 40px; border-bottom:2px solid var(--color-divider);\">\n        <span class=\"tag tag-accent\" style=\"margin-bottom:20px;\">Coming soon<\u002Fspan>\n        <h1 style=\"font-size:56px; line-height:1; margin:16px 0 18px; max-width:16ch;\">A BEAM chapter in every school.<\u002Fh1>\n        <p style=\"font-size:17px; max-width:60ch;\">We're opening chapters at schools all across Mongolia — public or private, capital or countryside. Each chapter is student-led, backed by a faculty advisor, and connected to the national BEAM network.<\u002Fp>\n      <\u002Fsection>\n      <section style=\"padding:0; display:grid; grid-template-columns:1.2fr .8fr; gap:0;\">\n        <div ref=\"{{ mapWrapRef }}\" style=\"position:relative; border-right:2px solid var(--color-divider); aspect-ratio:16/10;\">\n          <div ref=\"{{ mapRef }}\" style=\"position:absolute; inset:0; background:var(--color-surface); cursor:pointer;\"><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:40px;\">\n          <h3 style=\"margin-bottom:8px;\">Where we're headed<\u002Fh3>\n          <p class=\"text-muted\" style=\"font-size:13px; margin-bottom:18px;\">Target regions — chapters launching soon<\u002Fp>\n          <div style=\"display:flex; flex-wrap:wrap; gap:10px;\">\n            <span class=\"tag tag-neutral\">Ulaanbaatar<\u002Fspan>\n            <span class=\"tag tag-neutral\">Darkhan<\u002Fspan>\n            <span class=\"tag tag-neutral\">Erdenet<\u002Fspan>\n            <span class=\"tag tag-neutral\">Choibalsan<\u002Fspan>\n            <span class=\"tag tag-neutral\">Khovd<\u002Fspan>\n            <span class=\"tag tag-neutral\">Public schools<\u002Fspan>\n            <span class=\"tag tag-neutral\">Private schools<\u002Fspan>\n            <span class=\"tag tag-neutral\">Countryside soums<\u002Fspan>\n          <\u002Fdiv>\n          <a sc-camel-on-click=\"{{ goBecome }}\" class=\"btn btn-primary btn-block\" style=\"cursor:pointer; margin-top:26px;\">Bring BEAM to my school<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- EVENTS -->\n    <div style=\"display:{{ dEvents }};\">\n      <section style=\"padding:60px 40px; border-bottom:2px solid var(--color-divider);\">\n        <span class=\"tag tag-outline\" style=\"margin-bottom:18px;\">Events<\u002Fspan>\n        <h1 style=\"font-size:52px; line-height:1; margin:14px 0 10px;\">Business, in the arena.<\u002Fh1>\n        <p style=\"font-size:17px; max-width:58ch;\">All year round we run competitions, workshops and simulations where students put business skills to the test.<\u002Fp>\n      <\u002Fsection>\n      <section style=\"padding:0; border-bottom:2px solid var(--color-divider); display:grid; grid-template-columns:.9fr 1.1fr; gap:0;\">\n        <div style=\"padding:36px; border-right:2px solid var(--color-divider);\">\n          <span class=\"tag tag-accent\" style=\"margin-bottom:16px;\">Featured event<\u002Fspan>\n          <h2 style=\"font-size:34px; line-height:1.02; margin:14px 0 14px;\">ASeeder Business Simulation 2026<\u002Fh2>\n          <div style=\"display:flex; align-items:center; gap:10px; margin-bottom:18px; font-family:var(--font-heading); font-size:20px; color:var(--color-accent-700);\">\n            <svg sc-camel-view-box=\"0 0 24 24\" width=\"20\" height=\"20\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"18\"><\u002Frect><path d=\"M16 2v4M8 2v4M3 10h18\"><\u002Fpath><\u002Fsvg>\n            March 28–29, 2026\n          <\u002Fdiv>\n          <p style=\"font-size:15px;\">A two-day business simulation where student teams run virtual companies — making strategy, marketing and finance decisions in real time and competing to come out on top.<\u002Fp>\n          <a href=\"https://www.instagram.com/beam.mongolia/\" target=\"_blank\" class=\"btn btn-primary\" style=\"margin-top:12px; text-decoration:none;\">Register interest<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:1fr 1fr; grid-template-rows:1fr 1fr; gap:2px; background:var(--color-divider);\">\n          <div class=\"grayscale\" style=\"position:relative; grid-column:1 / span 2;\"><image-slot id=\"mod-ev1\" shape=\"rect\" placeholder=\"Event photo\"><\u002Fimage-slot><\u002Fdiv>\n          <div class=\"grayscale\" style=\"position:relative;\"><image-slot id=\"mod-ev2\" shape=\"rect\" placeholder=\"Event photo\"><\u002Fimage-slot><\u002Fdiv>\n          <div class=\"grayscale\" style=\"position:relative;\"><image-slot id=\"mod-ev3\" shape=\"rect\" placeholder=\"Event photo\"><\u002Fimage-slot><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n      <section style=\"padding:24px 40px;\">\n        <p class=\"text-muted\" style=\"font-size:14px;\">More events all year round — follow <a href=\"https://www.instagram.com/beam.mongolia/\" target=\"_blank\">@beam.mongolia<\u002Fa> for dates.<\u002Fp>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <!-- BECOME A CHAPTER -->\n    <div style=\"display:{{ dBecome }};\">\n      <section style=\"padding:0; display:grid; grid-template-columns:1fr 1fr; gap:0;\">\n        <div style=\"padding:60px 40px; border-right:2px solid var(--color-divider);\">\n          <span class=\"tag tag-outline\" style=\"margin-bottom:18px;\">Become a chapter<\u002Fspan>\n          <h1 style=\"font-size:48px; line-height:1.02; margin:14px 0 16px;\">Bring BEAM to your school.<\u002Fh1>\n          <p style=\"font-size:16px; max-width:44ch;\">Any school in Mongolia can start a chapter. Here's what you'll need to get going.<\u002Fp>\n          <div style=\"display:flex; flex-direction:column; gap:0; margin-top:28px; border-top:2px solid var(--color-divider);\">\n            <div style=\"display:flex; gap:14px; align-items:flex-start; padding:16px 0; border-bottom:2px solid var(--color-divider);\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\" style=\"flex:none; margin-top:2px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><div><div class=\"card-title\" style=\"font-size:16px;\">A team of 5+ committed students<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">Founding members ready to meet and build.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:14px; align-items:flex-start; padding:16px 0; border-bottom:2px solid var(--color-divider);\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\" style=\"flex:none; margin-top:2px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><div><div class=\"card-title\" style=\"font-size:16px;\">A faculty advisor<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A teacher who supports the chapter's activities.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:14px; align-items:flex-start; padding:16px 0; border-bottom:2px solid var(--color-divider);\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\" style=\"flex:none; margin-top:2px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><div><div class=\"card-title\" style=\"font-size:16px;\">Your school's approval<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">Permission to host BEAM activities on campus.<\u002Fp><\u002Fdiv><\u002Fdiv>\n            <div style=\"display:flex; gap:14px; align-items:flex-start; padding:16px 0;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\" style=\"flex:none; margin-top:2px;\"><path d=\"M20 6 9 17l-5-5\"><\u002Fpath><\u002Fsvg><div><div class=\"card-title\" style=\"font-size:16px;\">One event per semester<\u002Fdiv><p class=\"card-body\" style=\"font-size:13px;\">A willingness to run at least one activity each term.<\u002Fp><\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"padding:60px 40px; background:var(--color-surface);\">\n          <div style=\"display:{{ formShow }};\">\n            <h3 style=\"margin-bottom:6px;\">Apply to start a chapter<\u002Fh3>\n            <p class=\"text-muted\" style=\"font-size:13px; margin-bottom:20px;\">We'll reach out via email<\u002Fp>\n            <form sc-camel-on-submit=\"{{ submitForm }}\" style=\"display:flex; flex-direction:column; gap:16px;\">\n              <div class=\"field\"><label>Full name<\u002Flabel><input class=\"input\" name=\"name\" required=\"\" placeholder=\"Your name\"><\u002Fdiv>\n              <div class=\"field\"><label>School<\u002Flabel><input class=\"input\" name=\"school\" required=\"\" placeholder=\"School name\"><\u002Fdiv>\n              <div class=\"field\"><label>Email<\u002Flabel><input class=\"input\" name=\"email\" type=\"email\" required=\"\" placeholder=\"you@example.com\"><\u002Fdiv>\n              <div class=\"field\"><label>I am a…<\u002Flabel>\n                <div style=\"display:flex; gap:18px; margin-top:4px;\">\n                  <label class=\"radio\"><input type=\"radio\" name=\"role\" value=\"Student\" checked=\"\"><span class=\"dot\"><\u002Fspan>Student<\u002Flabel>\n                  <label class=\"radio\"><input type=\"radio\" name=\"role\" value=\"Teacher\"><span class=\"dot\"><\u002Fspan>Teacher<\u002Flabel>\n                  <label class=\"radio\"><input type=\"radio\" name=\"role\" value=\"Admin\"><span class=\"dot\"><\u002Fspan>Admin<\u002Flabel>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"field\"><label>Why BEAM at your school?<\u002Flabel><textarea class=\"input\" name=\"message\" placeholder=\"Tell us a little\"><\u002Ftextarea><\u002Fdiv>\n              <p style=\"display:{{ errShow }}; color:var(--color-accent-700); font-size:13px; margin:0;\">Something went wrong — please email beam.mongolia@gmail.com instead.<\u002Fp>\n              <button type=\"submit\" class=\"btn btn-primary btn-block\" disabled=\"{{ sending }}\">{{ submitLabel }}<\u002Fbutton>\n            <\u002Fform>\n          <\u002Fdiv>\n          <div style=\"display:{{ thanksShow }}; padding:40px 0;\">\n            <svg sc-camel-view-box=\"0 0 24 24\" width=\"44\" height=\"44\" fill=\"none\" stroke=\"var(--color-accent-700)\" stroke-width=\"2\" style=\"margin-bottom:16px;\"><circle cx=\"12\" cy=\"12\" r=\"10\"><\u002Fcircle><path d=\"m8 12 3 3 5-6\"><\u002Fpath><\u002Fsvg>\n            <h3>Thanks — talk soon!<\u002Fh3>\n            <p class=\"text-muted\">We'll follow up via <a href=\"https://www.instagram.com/beam.mongolia/\" target=\"_blank\">@beam.mongolia<\u002Fa> or email.<\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsection>\n    <\u002Fdiv>\n\n    <footer style=\"border-top:2px solid var(--color-divider); padding:36px 40px; display:grid; grid-template-columns:1.4fr 1fr; gap:40px; align-items:start;\">\n      <div>\n        <span class=\"nav-brand\" style=\"display:flex; align-items:center; gap:10px; font-size:18px;\">\n          <img src=\"2e86f85e-902d-43b8-94a5-63882fdfab51\" alt=\"BEAM logo\" style=\"height:28px; width:28px; object-fit:contain; display:block;\">\n          BEAM\n        <\u002Fspan>\n        <p class=\"text-muted\" style=\"font-size:13px; margin-top:10px;\">Business Education Association of Mongolia · © 2026<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; gap:10px;\">\n        <span class=\"card-kicker\" style=\"margin-bottom:2px;\">Contact<\u002Fspan>\n        <a href=\"https://www.instagram.com/beam.mongolia/\" target=\"_blank\" style=\"font-size:14px; display:flex; gap:8px; align-items:center;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"2\" width=\"20\" height=\"20\" rx=\"5\"><\u002Frect><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><circle cx=\"17.5\" cy=\"6.5\" r=\"1\"><\u002Fcircle><\u002Fsvg>@beam.mongolia<\u002Fa>\n        <a href=\"https://www.facebook.com/people/Business-Education-Association-of-Mongolia/61578509844409/\" target=\"_blank\" style=\"font-size:14px; display:flex; gap:8px; align-items:center;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><path d=\"M18 2h-3a5 5 0 0 0-5 5v3H7v4h3v8h4v-8h3l1-4h-4V7a1 1 0 0 1 1-1h3z\"><\u002Fpath><\u002Fsvg>Business Education Association of Mongolia<\u002Fa>\n        <a href=\"mailto:beam.mongolia@gmail.com\" style=\"font-size:14px; display:flex; gap:8px; align-items:center;\"><svg sc-camel-view-box=\"0 0 24 24\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\"><rect x=\"2\" y=\"4\" width=\"20\" height=\"16\"><\u002Frect><path d=\"m2 6 10 7L22 6\"><\u002Fpath><\u002Fsvg>beam.mongolia@gmail.com<\u002Fa>\n      <\u002Fdiv>\n    <\u002Ffooter>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1400,&quot;height&quot;:900},&quot;chapterLocations&quot;:{&quot;editor&quot;:&quot;text&quot;,&quot;tsType&quot;:&quot;string&quot;,&quot;default&quot;:&quot;Ulaanbaatar | 47.9188 | 106.9176\\nDarkhan | 49.4867 | 105.9228\\nErdenet | 49.0347 | 104.0447\\nChoibalsan | 48.0778 | 114.5350\\nKhovd | 48.0056 | 91.6419&quot;,&quot;section&quot;:&quot;Chapters map&quot;}}\">\nclass Component extends DCLogic {\n  state = { tab: 'home', sent: false, sending: false, error: false, slide: 0 };\n  componentDidMount() {\n    this.timer = setInterval(() => {\n      this.setState(s => ({ slide: (s.slide + 1) % 4 }));\n    }, 4500);\n  }\n  componentWillUnmount() { clearInterval(this.timer); if (this.map) this.map.remove(); }\n\n  parseLocations() {\n    const raw = this.props.chapterLocations ??\n      `Ulaanbaatar | 47.9188 | 106.9176\\nDarkhan | 49.4867 | 105.9228\\nErdenet | 49.0347 | 104.0447\\nChoibalsan | 48.0778 | 114.5350\\nKhovd | 48.0056 | 91.6419`;\n    return raw.split('\\n').map(l => {\n      const p = l.split('|').map(x => x.trim());\n      const lat = parseFloat(p[1]), lng = parseFloat(p[2]);\n      if (!p[0] || isNaN(lat) || isNaN(lng)) return null;\n      return { name: p[0], lat, lng };\n    }).filter(Boolean);\n  }\n\n  initMap() {\n    if (!window.L || !this._mapEl || this.map) return;\n    const accent = getComputedStyle(this._mapEl).getPropertyValue('--color-accent').trim() || '#211152';\n    const map = L.map(this._mapEl, { scrollWheelZoom: true, attributionControl: true });\n    this.map = map;\n    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {\n      attribution: '&copy; OpenStreetMap &copy; CARTO', maxZoom: 19,\n    }).addTo(map);\n    map.on('click', () => this.toggleEnlarge());\n    this.drawMarkers(accent);\n  }\n\n  drawMarkers(accent) {\n    if (!this.map) return;\n    if (this._layer) this._layer.remove();\n    this._layer = L.layerGroup().addTo(this.map);\n    const locs = this.parseLocations();\n    const pts = [];\n    locs.forEach(loc => {\n      const icon = L.divIcon({\n        className: '',\n        html: `<div style=\"width:18px;height:18px;background:${accent};border:2px solid #fff;box-shadow:0 1px 4px rgba(0,0,0,.4);transform:translate(-9px,-9px);\"><\u002Fdiv>`,\n      });\n      L.marker([loc.lat, loc.lng], { icon }).addTo(this._layer)\n        .bindPopup(`<b>${loc.name}<\u002Fb><br>BEAM chapter — coming soon`);\n      pts.push([loc.lat, loc.lng]);\n    });\n    this.map.setView([46.8625, 103.8467], 4);\n    if (pts.length === 1) this.map.setView(pts[0], 6);\n    else if (pts.length) { try { this.map.fitBounds(pts, { padding: [40, 40], maxZoom: 7 }); } catch (e) {} }\n  }\n\n  toggleEnlarge() {\n    if (!this._mapWrapEl) return;\n    const big = !this._big;\n    this._big = big;\n    const w = this._mapWrapEl;\n    if (big) {\n      w.style.cssText = 'position:fixed; inset:4vh 4vw; z-index:9999; aspect-ratio:auto; border:2px solid var(--color-divider); box-shadow:0 20px 60px rgba(0,0,0,.35); background:var(--color-bg);';\n    } else {\n      w.style.cssText = 'position:relative; border-right:2px solid var(--color-divider); aspect-ratio:16/10;';\n    }\n    setTimeout(() => { if (this.map) this.map.invalidateSize(); }, 60);\n  }\n\n  componentDidUpdate(prev) {\n    if (prev.chapterLocations !== this.props.chapterLocations && this.map) {\n      const accent = getComputedStyle(this._mapEl).getPropertyValue('--color-accent').trim() || '#211152';\n      this.drawMarkers(accent);\n    }\n  }\n  bump() { clearInterval(this.timer); this.componentDidMount(); }\n  renderVals() {\n    const t = this.state.tab, s = this.state.slide;\n    const d = n => t === n ? 'block' : 'none';\n    const c = n => t === n ? 'page' : null;\n    const set = n => () => {\n      this.setState({ tab: n });\n      if (n === 'chapters') setTimeout(() => { if (this.map) { this.map.invalidateSize(); this.drawMarkers(getComputedStyle(this._mapEl).getPropertyValue('--color-accent').trim() || '#211152'); } }, 60);\n    };\n    const goSlide = i => () => { this.setState({ slide: i }); this.bump(); };\n    return {\n      mapWrapRef: el => { this._mapWrapEl = el; },\n      mapRef: el => {\n        this._mapEl = el;\n        if (el) {\n          if (window.L) this.initMap();\n          else { const iv = setInterval(() => { if (window.L) { clearInterval(iv); this.initMap(); } }, 120); }\n        }\n      },\n      goHome: set('home'), goAbout: set('about'), goChapters: set('chapters'), goEvents: set('events'), goBecome: set('become'),\n      dHome: d('home'), dAbout: d('about'), dChapters: d('chapters'), dEvents: d('events'), dBecome: d('become'),\n      cHome: c('home'), cAbout: c('about'), cChapters: c('chapters'), cEvents: c('events'), cBecome: c('become'),\n      op0: s === 0 ? 1 : 0, op1: s === 1 ? 1 : 0, op2: s === 2 ? 1 : 0, op3: s === 3 ? 1 : 0,\n      dot0: s === 0 ? 'on' : '', dot1: s === 1 ? 'on' : '', dot2: s === 2 ? 'on' : '', dot3: s === 3 ? 'on' : '',\n      go0: goSlide(0), go1: goSlide(1), go2: goSlide(2), go3: goSlide(3),\n      prev: () => { this.setState(x => ({ slide: (x.slide + 3) % 4 })); this.bump(); },\n      next: () => { this.setState(x => ({ slide: (x.slide + 1) % 4 })); this.bump(); },\n      formShow: this.state.sent ? 'none' : 'block', thanksShow: this.state.sent ? 'block' : 'none',\n      errShow: this.state.error ? 'block' : 'none',\n      sending: this.state.sending,\n      submitLabel: this.state.sending ? 'Sending…' : 'Submit application',\n      submitForm: e => {\n        e.preventDefault();\n        const form = e.target;\n        this.setState({ sending: true, error: false });\n        fetch('https://formspree.io/f/xojgdywy', {\n          method: 'POST',\n          headers: { 'Accept': 'application/json' },\n          body: new FormData(form),\n        }).then(r => {\n          if (r.ok) this.setState({ sent: true, sending: false });\n          else this.setState({ error: true, sending: false });\n        }).catch(() => this.setState({ error: true, sending: false }));\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
